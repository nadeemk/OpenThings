name: openthings
description: "OpenThings — a cross-platform Things 3 clone. Local-first, offline-complete."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.3

  # Navigation
  go_router: ^16.3.0

  # Local database (SQLite, reactive queries)
  drift: ^2.28.2
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

  # Sync backend (optional at runtime; enabled via --dart-define)
  supabase_flutter: ^2.10.3
  powersync: ^1.18.0

  # Integrations
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  flutter_markdown_plus: ^1.0.3
  device_calendar: ^4.3.3
  home_widget: ^0.8.0
  hotkey_manager: ^0.2.3
  window_manager: ^0.4.3

# device_calendar 4.x pins timezone ^0.9 while flutter_local_notifications
# 19.x needs ^0.10; the timezone API used by device_calendar is unchanged
# between the two, so force the newer one.
dependency_overrides:
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.28.3
  build_runner: ^2.7.4

flutter:
  uses-material-design: true
