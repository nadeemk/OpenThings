name: openthings
description: "OpenThings — a cross-platform Things 3 clone. Local-first, offline-complete."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.3

  # Navigation
  go_router: ^16.3.0

  # Local database (SQLite, reactive queries)
  drift: ^2.28.2
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.28.3
  build_runner: ^2.7.4

flutter:
  uses-material-design: true
